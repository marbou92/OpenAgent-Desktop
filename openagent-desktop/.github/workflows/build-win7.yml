name: Build Windows 7

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-win7:
    name: Build Windows 7 Portable & NSIS
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Override Electron version for Win7 compatibility
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.dependencies.electron = "^22.0.0"
          $pkg.devDependencies.electron = "^22.0.0"
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
          npm install electron@22 --save-dev
        shell: pwsh

      - name: Rebuild native modules for Electron 22
        run: |
          npx electron-rebuild -v 22.3.27
        shell: pwsh

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart('v')
          } else {
            $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Electron (Win7 NSIS installer)
        run: npm run electron:build -- --win nsis --config.win.target=nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Win7 Portable)
        run: npm run electron:build -- --win portable --config.win.target=portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts with Win7 suffix
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Get-ChildItem -Path release -Filter "*.exe" | ForEach-Object {
            $newName = $_.Name -replace '\.exe$', "-Win7.exe"
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Upload Win7 NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: openagent-desktop-win7-nsis
          path: release/*-Win7.exe
          retention-days: 30

      - name: Upload Win7 portable
        uses: actions/upload-artifact@v4
        with:
          name: openagent-desktop-win7-portable
          path: release/*-Win7.exe
          retention-days: 30

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*-Win7.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
