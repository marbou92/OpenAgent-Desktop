name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-preview:
    name: Build Preview (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Build Electron (macOS)
        if: runner.os == 'macOS'
        run: npm run electron:build -- --mac --config.mac.identity=null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron (Windows)
        if: runner.os == 'Windows'
        run: npm run electron:build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS preview
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-macos-${{ github.event.pull_request.number }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 7

      - name: Upload Windows preview
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-windows-${{ github.event.pull_request.number }}
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 7

  comment-pr:
    name: Comment on PR
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - name: Comment download links
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;

            const macosArtifact = `pr-preview-macos-${prNumber}`;
            const windowsArtifact = `pr-preview-windows-${prNumber}`;

            const downloadBaseUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const body = `## 📦 PR Preview Build\n\n` +
              `Build artifacts are ready for testing:\n\n` +
              `| Platform | Artifact | Download |\n` +
              `|----------|----------|----------|\n` +
              `| macOS | \`${macosArtifact}\` | [Download](${downloadBaseUrl}) |\n` +
              `| Windows | \`${windowsArtifact}\` | [Download](${downloadBaseUrl}) |\n\n` +
              `> **Note**: You must be logged in to GitHub to download artifacts.\n` +
              `> Artifacts are retained for 7 days.\n\n` +
              `**Commit**: ${context.payload.pull_request.head.sha.substring(0, 7)}\n` +
              `**Branch**: \`${context.payload.pull_request.head.ref}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(
              (comment) =>
                comment.user.type === 'Bot' &&
                comment.body.includes('PR Preview Build')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
