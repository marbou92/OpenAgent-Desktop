name: Auto Unzip Mobile Uploads

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write # 👈 This line fixes the "remote rejected" error

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Archive (Force Overwrite)
        run: |
          unzip -o *.zip
          rm *.zip

      - name: Commit and Push Extracted Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Automatically unpacked uploaded ZIP folder" || echo "No changes to commit"
          git push
