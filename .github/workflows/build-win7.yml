name: Build Windows 7

on:
  push:
    branches: [main, develop]
    paths:
      - 'electron/**'
      - 'src/**'
      - 'package.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win7:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Downgrade Electron for Windows 7 compatibility
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageJsonPath = "package.json"

          try {
            # Read and parse package.json
            Write-Host "Reading package.json..."
            $packageJson = Get-Content -Path $packageJsonPath -Raw | ConvertFrom-Json

            # Store original electron version for rollback
            $originalVersion = $packageJson.devDependencies.electron
            Write-Host "Original Electron version: $originalVersion"

            # Electron 22.x is the last version supporting Windows 7
            $targetVersion = "^22.3.27"
            Write-Host "Downgrading Electron to: $targetVersion"

            # Modify the version
            $packageJson.devDependencies.electron = $targetVersion

            # Write back to file
            $packageJson | ConvertTo-Json -Depth 100 | Set-Content -Path $packageJsonPath -Encoding UTF8

            # Validate the JSON was modified correctly
            Write-Host "Validating modification..."
            $modifiedJson = Get-Content -Path $packageJsonPath -Raw | ConvertFrom-Json
            $modifiedVersion = $modifiedJson.devDependencies.electron

            if ($modifiedVersion -ne $targetVersion) {
              Write-Error "Validation failed: Expected '$targetVersion' but got '$modifiedVersion'"
              exit 1
            }

            Write-Host "Successfully downgraded Electron from $originalVersion to $modifiedVersion"

            # Save original version to environment for potential rollback
            echo "ORIGINAL_ELECTRON_VERSION=$originalVersion" >> $env:GITHUB_ENV

          } catch {
            Write-Error "Failed to downgrade Electron: $_"

            # Attempt rollback
            try {
              Write-Host "Attempting rollback..."
              if (Test-Path $packageJsonPath) {
                $rollbackJson = Get-Content -Path $packageJsonPath -Raw | ConvertFrom-Json
                if ($env:ORIGINAL_ELECTRON_VERSION) {
                  $rollbackJson.devDependencies.electron = $env:ORIGINAL_ELECTRON_VERSION
                  $rollbackJson | ConvertTo-Json -Depth 100 | Set-Content -Path $packageJsonPath -Encoding UTF8
                  Write-Host "Rollback successful - restored Electron to $env:ORIGINAL_ELECTRON_VERSION"
                } else {
                  Write-Warning "No original version stored, cannot rollback automatically"
                }
              }
            } catch {
              Write-Warning "Rollback also failed: $_"
            }

            exit 1
          }

      - name: Reinstall with downgraded Electron
        run: |
          Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
          npm install

      - name: Verify Electron version
        shell: pwsh
        run: |
          $electronVersion = (Get-Content node_modules/electron/package.json | ConvertFrom-Json).version
          Write-Host "Installed Electron version: $electronVersion"
          if ($electronVersion -notmatch "^22\.") {
            Write-Error "Electron version $electronVersion does not start with 22.x - Windows 7 compatibility may be broken"
            exit 1
          }

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build application
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows 7 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win7-build
          path: release/
          retention-days: 90

      - name: Restore original Electron version
        if: always()
        shell: pwsh
        run: |
          if ($env:ORIGINAL_ELECTRON_VERSION) {
            try {
              $packageJsonPath = "package.json"
              $packageJson = Get-Content -Path $packageJsonPath -Raw | ConvertFrom-Json
              $packageJson.devDependencies.electron = $env:ORIGINAL_ELECTRON_VERSION
              $packageJson | ConvertTo-Json -Depth 100 | Set-Content -Path $packageJsonPath -Encoding UTF8
              Write-Host "Restored Electron version to $env:ORIGINAL_ELECTRON_VERSION"
            } catch {
              Write-Warning "Failed to restore original Electron version: $_"
            }
          }
