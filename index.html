<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenAgent-Desktop - Open-source AI Agent Platform with 35+ Providers and 60+ Extensions" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="dark light" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>OpenAgent-Desktop</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        /* open-cowork-inspired: Plus Jakarta Sans for UI, JetBrains Mono for code */
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'cv11', 'ss01';
        letter-spacing: -0.006em;
      }

      code, pre, .font-mono {
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      }

      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #171614 0%, #1d1b18 50%, #22201d 100%);
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-skip {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 6px 16px;
        border-radius: 8px;
        border: 1px solid rgba(241, 236, 228, 0.15);
        background: rgba(241, 236, 228, 0.05);
        color: #b6ada2;
        font-size: 12px;
        font-weight: 500;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        backdrop-filter: blur(4px);
      }

      #splash-skip:hover {
        background: rgba(214, 122, 82, 0.12);
        border-color: rgba(214, 122, 82, 0.3);
        color: #d67a52;
      }

      #splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: rgba(214, 122, 82, 0.12);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }

      #splash-logo svg {
        width: 48px;
        height: 48px;
        color: #d67a52;
      }

      #splash-title {
        color: #f1ece4;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }

      #splash-subtitle {
        color: #b6ada2;
        font-size: 14px;
        font-weight: 400;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        transition: color 0.3s;
      }

      #splash-progress-container {
        margin-top: 32px;
        width: 280px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      #splash-progress-bar {
        width: 100%;
        height: 4px;
        background: rgba(241, 236, 228, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }

      #splash-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #d67a52, #e8a07e);
        border-radius: 2px;
        transition: width 0.5s ease-out;
      }

      #splash-progress-text {
        color: #8c8378;
        font-size: 11px;
        font-weight: 400;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        opacity: 0.7;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <button id="splash-skip" onclick="window.__skipSplash && window.__skipSplash()">Skip →</button>
      <div id="splash-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <div id="splash-title">OpenAgent-Desktop</div>
      <div id="splash-subtitle">Loading your AI workspace…</div>
      <div id="splash-progress-container">
        <div id="splash-progress-bar">
          <div id="splash-progress-fill"></div>
        </div>
        <div id="splash-progress-text">Initializing…</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.stopPropagation();
      });
      document.addEventListener('drop', function (e) {
        e.preventDefault();
        e.stopPropagation();
      });

      // Phase 4.3: Splash screen stays until the catalog refresh completes.
      // The main process sends progress via custom DOM events dispatched by
      // the preload script. A skip button lets the user bypass the wait.
      (function () {
        var splash = document.getElementById('splash-screen');
        var fill = document.getElementById('splash-progress-fill');
        var text = document.getElementById('splash-progress-text');
        var subtitle = document.getElementById('splash-subtitle');
        var skipped = false;
        var progress = 0;

        function removeSplash() {
          if (!splash || skipped) return;
          skipped = true;
          splash.classList.add('fade-out');
          setTimeout(function () { splash.remove(); }, 400);
        }

        // Skip button handler
        window.__skipSplash = removeSplash;

        // Listen for catalog progress events (dispatched by preload.ts)
        window.addEventListener('openagent:catalog-progress', function (e) {
          if (skipped) return;
          var pct = e.detail && e.detail.percent;
          var msg = e.detail && e.detail.message;
          if (typeof pct === 'number' && pct > progress) {
            progress = pct;
            if (fill) fill.style.width = Math.min(pct, 100) + '%';
          }
          if (msg && text) text.textContent = msg;
          if (msg && subtitle) subtitle.textContent = msg;
        });

        // Listen for catalog-ready (catalog refresh done — remove splash)
        window.addEventListener('openagent:catalog-ready', function () {
          if (skipped) return;
          if (fill) fill.style.width = '100%';
          if (text) text.textContent = 'Ready!';
          setTimeout(removeSplash, 300);
        });

        // Listen for main:ready (fallback — if catalog takes too long,
        // main:ready fires after all subsystems are initialized)
        window.addEventListener('openagent:main-ready', function () {
          if (skipped) return;
          if (fill) fill.style.width = '90%';
          if (text) text.textContent = 'Almost ready…';
        });

        // Simulated progress: increment slowly so the bar isn't stuck at 0%
        // while the HTTP fetch is in flight. Caps at 85% until catalog-ready.
        var simInterval = setInterval(function () {
          if (skipped) { clearInterval(simInterval); return; }
          if (progress < 85) {
            progress = Math.min(progress + 3, 85);
            if (fill) fill.style.width = progress + '%';
          }
        }, 600);

        // Phase 4.4: Poll catalog:is-ready as a fallback in case the
        // main:catalog-ready IPC event was missed (fired before the preload
        // registered its listener). Check every 1s starting at 2s.
        setTimeout(function () {
          var pollInterval = setInterval(function () {
            if (skipped) { clearInterval(pollInterval); return; }
            if (window.openagent && window.openagent.catalogIsReady) {
              window.openagent.catalogIsReady().then(function (result) {
                if (result && result.ready && !skipped) {
                  clearInterval(pollInterval);
                  if (fill) fill.style.width = '100%';
                  if (text) text.textContent = 'Ready!';
                  setTimeout(removeSplash, 300);
                }
              }).catch(function () { /* ignore — will retry next interval */ });
            }
          }, 1000);
        }, 2000);

        // Safety timeout: if nothing happens in 30s, auto-remove.
        setTimeout(function () {
          if (!skipped) {
            console.warn('[Splash] Timed out after 30s — removing splash');
            removeSplash();
          }
        }, 30000);
      })();
    </script>
  </body>
</html>
